<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>闘技場のコスプレイヤー - 雲霄の掌門・儀玄 vs マッドタール</title>
    <style>
        :root {
            --bg-color: #0c0d10;
            --panel-bg: #151821;
            --text-color: #f1f3f9;
            --accent-heroine: #3a96ff; 
            --accent-enemy: #a55cca; 
            --text-inner: #b0c2de;
            --text-spectator: #ffd60a;
        }

        html, body {
            overscroll-behavior-y: none;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-touch-callout: none;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.5;
            display: flex;
            justify-content: center;
            align-items: center;
            -webkit-user-select: none;
            user-select: none;
        }

        #game-container {
            width: 100%;
            max-width: 480px;
            height: 100%;
            background-color: #0f111a;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            border-left: 1px solid #222530;
            border-right: 1px solid #222530;
        }

        .screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            padding: 10px;
            overflow-y: auto;
        }

        .screen.active {
            display: flex;
        }

        #screen-battle {
            display: none;
            flex-direction: column;
            overflow: hidden;
            position: relative; 
        }
        #screen-battle.active {
            display: flex;
        }

        h1 {
            text-align: center;
            font-size: 1.3rem;
            margin-bottom: 15px;
            color: var(--accent-heroine);
            text-shadow: 0 0 12px rgba(58,150,255,0.4);
        }

        .select-box {
            background: var(--panel-bg);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 12px;
            border: 1px solid #252a3a;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            color: #fff;
            transition: background 0.2s;
        }
        .btn-heroine { background: #1d71ff; }
        .btn-enemy { background: #732d91; }
        .btn-start { background: #30d158; }
        .btn-copy { background: #3d4566; border: 1px solid #5a6594; }
        .btn-copy:active { background: #2b314a; }
        .btn-copy-filtered { background: #8e44ad; border: 1px solid #a55cca; }
        .btn-copy-filtered:active { background: #732d91; }

        .char-preview-container {
            text-align: center;
            margin: 5px 0;
        }
        .preview-img {
            width: 140px;
            height: 180px;
            object-fit: contain;
            border-radius: 8px;
            border: 2px solid var(--accent-heroine);
            background: #000;
        }

        #battle-visual-area {
            width: 100%;
            height: 220px;
            background: linear-gradient(180deg, #101424 0%, #07080c 100%);
            border: 1px solid #222530;
            border-radius: 8px;
            margin-bottom: 4px;
            position: relative;
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-shrink: 0;
            overflow: hidden;
        }

        .battle-char-container {
            width: 45%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: visible;
        }

        .battle-char-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            position: relative;
            z-index: 1;
            transition: transform 0.4s ease, filter 0.3s ease;
        }

        .mud-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 2;
            background-repeat: no-repeat;
        }

        .mud-overlay.active {
            opacity: 1;
            background-image:
                radial-gradient(circle at 35% 30%, rgba(30, 15, 40, 0.6) 0%, rgba(20, 10, 30, 0.4) 55%, transparent 60%),
                radial-gradient(circle at 65% 30%, rgba(40, 20, 50, 0.5) 0%, rgba(30, 15, 40, 0.3) 50%, transparent 70%),
                radial-gradient(circle at 20% 70%, rgba(20, 5, 25, 0.7) 0%, rgba(10, 2, 15, 0.5) 55%, transparent 75%),
                radial-gradient(ellipse at 80% 80%, rgba(50, 20, 60, 0.6) 0%, rgba(30, 10, 40, 0.4) 25%, transparent 35%),
                radial-gradient(circle at 75% 60%, rgba(35, 10, 45, 0.5) 0%, rgba(25, 5, 30, 0.4) 48%, transparent 70%),
                radial-gradient(circle at 50% 70%, rgba(20, 5, 30, 0.5) 0%, rgba(10, 2, 20, 0.3) 55%, transparent 60%);
        }

        #heroine-visual-container.polluted .battle-char-img {
            filter: sepia(40%) hue-rotate(260deg) contrast(110%); 
        }
        
        .visual-effect-glow {
            box-shadow: inset 0 0 30px rgba(58,150,255,0.4);
        }

        .filter-control-panel {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 4px;
            padding: 0 2px;
            flex-shrink: 0;
        }
        .toggle-btn {
            background: #1c1f2b;
            color: #8892b0;
            border: 1px solid #3d4566;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .toggle-btn.active {
            background: #3a1a45;
            color: #d78cf0;
            border-color: #793c8f;
        }

        #log-area {
            flex: 1; 
            min-height: 0;
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch; 
            padding: 10px;
            background: #0d1017; 
            border-radius: 6px;
            margin-bottom: 4px;
            font-size: 0.95rem;
            border: 2px solid #202433; 
            display: flex;
            flex-direction: column;
            -webkit-user-select: text;
            user-select: text;
        }

        .log-entry {
            margin-bottom: 8px;
            padding: 8px 10px;
            border-radius: 6px;
            line-height: 1.4;
            word-break: break-all;
            background: rgba(255, 255, 255, 0.02);
            border-left: 3px solid #3d4566;
            flex-shrink: 0; 
        }

        .log-system { background: rgba(48, 209, 88, 0.06); border-left-color: #30d158; color: #5af283; font-weight: bold; font-size: 0.85rem;}
        .log-text { color: var(--text-color); }
        .log-heroine-outer { color: #66aeff; font-weight: bold; }
        .log-heroine-inner { color: var(--text-inner); font-style: italic; display: block; margin-top: 4px; padding-left: 8px; border-left: 1px dashed #556278;}
        .log-enemy-speech { background: rgba(165, 92, 202, 0.1); border-left-color: var(--accent-enemy); color: #c481e3; font-weight: bold; }
        .log-spectator { background: rgba(255, 214, 10, 0.05); border-left-color: var(--text-spectator); color: #ffe14d;}
        .log-warning { background: rgba(255, 59, 48, 0.1); border-left-color: #ff3b30; color: #ff6b6b; font-weight: bold; }

        #status-area {
            background: var(--panel-bg);
            padding: 6px 8px;
            border-radius: 6px;
            margin-bottom: 4px;
            font-size: 0.8rem;
            border: 1px solid #252a3a;
            flex-shrink: 0;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3px;
        }

        .gauge-container {
            background: #222533;
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
            position: relative;
        }

        .gauge-bar { height: 100%; transition: width 0.3s ease; }
        .hp-bar-heroine { background: linear-gradient(90deg, #1d71ff, #3a96ff); }
        .hp-bar-enemy { background: linear-gradient(90deg, #732d91, #a55cca); }
        .charge-bar { background: linear-gradient(90deg, #ff9500, #ffd60a); }
        .gauge-text { position: absolute; width: 100%; text-align: center; font-size: 8px; line-height: 10px; color: #fff; font-weight: bold; }

        .mental-tag {
            padding: 1px 4px;
            border-radius: 3px;
            font-weight: bold;
            font-size: 0.65rem;
            text-align: center;
        }
        .m-通常 { background: #636e72; color: #fff; }
        .m-昂揚 { background: #0984e3; color: #fff; }
        .m-怯え { background: #6c5ce7; color: #fff; }
        .m-屈辱 { background: #a29bfe; color: #fff; }
        .m-絶望 { background: #000000; color: #ff3b30; border: 1px solid #ff3b30; }

        .debuff-badge {
            background: #8e44ad;
            color: white;
            font-size: 9px;
            padding: 1px 4px;
            border-radius: 3px;
            font-weight: bold;
            margin-left: 4px;
        }
        .bind-badge {
            background: #ff3b30;
            color: white;
            font-size: 9px;
            padding: 1px 4px;
            border-radius: 3px;
            font-weight: bold;
            margin-left: 2px;
            box-shadow: 0 0 5px rgba(255,59,48,0.5);
            animation: bindBlink 1s infinite alternate;
        }

        @keyframes bindBlink {
            0% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        #command-area {
            background: #151821;
            padding: 6px 8px;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            border: 1px solid #252a3a;
            flex-shrink: 0;
        }

        #hand-container {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding-bottom: 2px;
            height: 84px;
            transition: all 0.2s;
        }

        .card {
            flex: 0 0 90px;
            height: 76px;
            background: #222636;
            border: 1px solid #3d4566;
            border-radius: 5px;
            padding: 4px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            font-size: 0.7rem;
            cursor: pointer;
            color: #fff;
        }
        .card.special {
            background: linear-gradient(135deg, #1b2640, #133966);
            border-color: var(--accent-heroine);
            box-shadow: 0 0 6px rgba(58,150,255,0.4);
        }
        .card.enemy-special {
            background: linear-gradient(135deg, #2b1136, #4b1b5e);
            border-color: var(--accent-enemy);
        }
        .card.disabled {
            opacity: 0.4;
            pointer-events: none;
            background: #2d3142 !important;
        }
        .card-name { font-weight: bold; line-height: 1.2; height: 2.4em; overflow: hidden; color: #e3e7f0; }
        .card-meta { display: flex; justify-content: space-between; font-size: 0.55rem; color: #9daec6; font-weight: bold; }

        .pass-btn {
            background: #2c3040;
            color: #fff;
            border: 1px solid #3d4566;
            padding: 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .end-trigger-btn {
            position: absolute;
            bottom: 20px;
            left: 15px;
            right: 15px;
            background: linear-gradient(135deg, #8a1f11, #b82e14);
            color: #fff;
            border: 2px solid #ff6b6b;
            padding: 14px;
            border-radius: 8px;
            font-size: 1.05rem;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            z-index: 9999; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.7);
            animation: pulseGlow 1.5s infinite alternate;
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 5px 15px rgba(240, 50, 50, 0.4); }
            100% { box-shadow: 0 5px 25px rgba(240, 50, 50, 0.8); }
        }

        .forecast-panel {
            background: #12141c;
            border: 1px dashed #3d4566;
            padding: 10px;
            border-radius: 5px;
            font-size: 0.85rem;
            margin-top: 8px;
        }

        #result-text {
            font-size: 0.95rem;
            white-space: pre-wrap;
            margin-bottom: 20px;
            flex: 1;
            background: #07080c;
            padding: 15px;
            border-radius: 6px;
            overflow-y: auto;
            border: 1px solid #252a3a;
        }
    </style>
</head>
<body>

<div id="game-container">

    <div id="screen-select" class="screen active">
        <h1>闘技場のコスプレイヤー</h1>

        <div class="select-box">
            <h3 style="color:#3a96ff;">📷 【必須】ヒロイン（儀玄）の画像を4枚選ぶ</h3>
            <p style="font-size:0.7rem; color:#8892b0; margin-bottom:6px;">タップして画像（立ち絵用）を4枚同時に選択してください。</p>
            <input type="file" id="image-uploader-heroine" multiple accept="image/*" onchange="loadHeroineImages(event)">
        </div>

        <div class="select-box">
            <h3 style="color:#a55cca;">📷 【任意】悪役（マッドタール）の画像を選ぶ</h3>
            <p style="font-size:0.7rem; color:#8892b0; margin-bottom:6px;">画像を選択してください（1枚）</p>
            <input type="file" id="image-uploader-enemy" accept="image/*" onchange="loadEnemyImage(event)">
        </div>

        <div class="select-box">
            <h3>1. 操作陣営を選択</h3>
            <button class="btn btn-heroine" onclick="selectSide('heroine')">雲霄の掌門・儀玄</button>
            <button class="btn btn-enemy" onclick="selectSide('enemy')">汚染の鉄顎・マッドタール</button>
        </div>

        <div id="forecast-area" style="display:none;">
            <div class="char-preview-container">
                <img id="select-preview-img" src="" alt="キャラクター ビジュアル" class="preview-img">
            </div>
            <div class="select-box">
                <h3>2. 試合展開予想 & 難易度</h3>
                <div style="margin-bottom: 4px;">選択側難易度: <span id="difficulty-output"></span></div>
                <div class="forecast-panel" id="forecast-text"></div>
                <button class="btn btn-start" onclick="startBattle()">闘技場へ入場する</button>
            </div>
        </div>
    </div>

    <div id="screen-battle" class="screen">
        <div id="battle-visual-area">
            <div id="heroine-visual-container" class="battle-char-container">
                <img id="heroine-visual" src="" alt="儀玄 立ち絵" class="battle-char-img">
                <div id="heroine-mud-overlay" class="mud-overlay"></div>
            </div>
            <div id="enemy-visual-container" class="battle-char-container">
                <img id="enemy-visual" src="" alt="悪役 立ち絵" class="battle-char-img">
            </div>
        </div>

        <div class="filter-control-panel" id="filter-panel-area" style="display: none;">
            <button id="filter-toggle-btn" class="toggle-btn active" onclick="toggleFilter()">汚染フィルター: ON</button>
        </div>

        <div id="log-area"></div>

        <div id="status-area">
            <div id="polluted-marker-line" style="margin-bottom: 2px; text-align: right; height: 14px;">
                <span id="polluted-marker"></span>
            </div>
            
            <div class="status-row">
                <span style="color:var(--accent-heroine); font-weight:bold; width: 45px;">儀玄</span>
                <span id="heroine-mental" class="mental-tag m-通常" style="width: 32px;">通常</span>
                <span id="heroine-bind-marker"></span>
                <div class="gauge-container" style="width: 38%;">
                    <div id="heroine-hp-bar" class="gauge-bar hp-bar-heroine" style="width: 100%;"></div>
                    <div id="heroine-hp-text" class="gauge-text">HP: 500</div>
                </div>
                <div class="gauge-container" style="width: 20%;">
                    <div id="heroine-charge-bar" class="gauge-bar charge-bar" style="width: 0%;"></div>
                    <div id="heroine-charge-text" class="gauge-text">CHG: 0</div>
                </div>
            </div>
            <div class="status-row" style="margin-bottom: 4px; font-size: 0.7rem; color:#8892b0;">
                <span>SPD:<span id="h-spd">70</span>/IQ:<span id="h-int">60</span>/ATK:<span id="h-atk">75</span>/DEF:<span id="h-def">65</span></span>
                <span>倍率速度:<span id="h-speed-val">-</span></span>
            </div>

            <div class="status-row">
                <span style="color:var(--accent-enemy); font-weight:bold; width: 55px;">タール</span>
                <div class="gauge-container" style="width: 45%;">
                    <div id="enemy-hp-bar" class="gauge-bar hp-bar-enemy" style="width: 100%;"></div>
                    <div id="enemy-hp-text" class="gauge-text">HP: 500</div>
                </div>
                <div class="gauge-container" style="width: 22%;">
                    <div id="enemy-charge-bar" class="gauge-bar charge-bar" style="width: 0%;"></div>
                    <div id="enemy-charge-text" class="gauge-text">CHG: 0</div>
                </div>
            </div>
            <div class="status-row" style="font-size: 0.7rem; color:#8892b0;">
                <span>SPD:30/IQ:55/ATK:70/DEF:<span id="e-def">75</span></span>
                <span>倍率速度: <span id="e-speed-val">-</span></span>
            </div>
        </div>

        <div id="command-area">
            <div style="display: flex; justify-content: space-between; align-items: center; font-size:0.75rem; font-weight:bold; color:#a8b2d1;">
                <span id="turn-indicator">あなたのターン</span>
                <button id="toggle-hand-btn" class="toggle-btn" onclick="toggleHand()">手札を隠す</button>
            </div>
            <div id="battle-controls">
                <div id="hand-container"></div>
                <button class="pass-btn" id="pass-button" onclick="playerPass()" style="width: 100%; margin-top: 4px;">カードを使わずにターン終了 (次ドロー+2)</button>
            </div>
        </div>

        <button id="end-trigger" class="end-trigger-btn" style="display: none;" onclick="goToEnding()">激闘終結：結末（エンディング）を確認する</button>
    </div>

    <div id="result-screen" class="screen">
        <h1 id="result-title">戦闘結末</h1>
        <div id="result-text"></div>
        
        <button id="copy-log-btn" class="btn btn-copy" style="display: none; margin-bottom: 10px;" onclick="copyLog()">全戦闘ログをコピー（観客ヤジ等含む）</button>
        <button id="copy-action-log-btn" class="btn btn-copy-filtered" style="display: none; margin-bottom: 10px;" onclick="copyActionLog()">ヒロイン・悪役のアクション、ダメージだけをコピー</button>
        
        <button class="btn btn-start" onclick="location.reload()">タイトルへ戻る</button>
    </div>

</div>

<script>
const dummyImage = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='180'><rect width='140' height='180' fill='%23222530'/><text x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' fill='%235a6594' font-size='11'>画像未読込</text></svg>";

let heroineImages = [dummyImage, dummyImage, dummyImage, dummyImage];
let enemyImage = dummyImage;

// ログ保存用のグローバル変数
let storedFullLog = "";
let storedActionLog = "";

function loadHeroineImages(event) {
    const files = event.target.files;
    if (!files || files.length === 0) return;
    heroineImages = [];
    for (let i = 0; i < Math.min(files.length, 4); i++) {
        heroineImages.push(URL.createObjectURL(files[i]));
    }
    while (heroineImages.length < 4 && heroineImages.length > 0) {
        heroineImages.push(heroineImages[0]);
    }
    if (playerSide === 'heroine' && heroineImages.length > 0) {
        document.getElementById('select-preview-img').src = heroineImages[0];
    }
    alert("ヒロインの画像を認識しました！");
}

function loadEnemyImage(event) {
    const files = event.target.files;
    if (!files || files.length === 0) return;
    enemyImage = URL.createObjectURL(files[0]);
    if (playerSide === 'enemy') {
        document.getElementById('select-preview-img').src = enemyImage;
    }
    alert("悪役の画像を認識しました！");
}

const initialData = {
    heroine: {
        name: "儀玄",
        title: "雲霄の掌門",
        stats: { atk: 75, def: 65, spd: 70, int: 60 },
        current: { 
            hp: 500, actionCount: 0, chargeValue: 0, hand: [], skippedLastTurn: false, 
            state: "通常", lastState: "通常",
            pollutionValue: 0,
            isBound: false,
            evadeBuffTurns: 0,       
            disable阵法Turns: 0,    
            stunnedTurns: 0         
        },
        normalCards: [
            { id: "n1", name: "命破拳", power: 60, hit: 80, charge: 20, desc: "青黒い墨のエーテル掌打" },
            { id: "n2", name: "碧空脚", power: 90, hit: 50, charge: 15, desc: "打点の高い豪快な蹴り" },
            { id: "n3", name: "エーテル弾", power: 40, hit: 120, charge: 30, desc: "黄色い符籙から追尾光弾" }
        ],
        specialCards: [
            { id: "s1", name: "玄墨陣法", power: 0, hit: 0, desc: "太極陣法を展開、2ターン回避値+40", isSpecial: true, is阵法: true },
            { id: "s2", name: "青溟爆震", power: 110, hit: 100, desc: "青溟の翼で大爆発。使用後大きな反動", isSpecial: true, isUltimate: true }
        ],
        dialogue: {
            intro: { outer: "「これより黒妖会の悪業を断つ。雲霄の術式、その身に刻むが良い」", inner: "（この衣装が放つ術の循環は完璧……。だが、観客たちのあの劣情混じりの視線、不快極まりないな……）" }
        }
    },
    enemy: {
        name: "汚染の鉄顎・マッドタール",
        title: "タール・スライム・触手",
        stats: { atk: 70, def: 75, spd: 30, int: 55 },
        current: { 
            hp: 500, actionCount: 0, chargeValue: 0, hand: [], skippedLastTurn: false,
            missCount: 0,
            defDebuffTurns: 0
        },

let playerSide = 'heroine';
let heroine, enemy;
let isGameOver = false;
let forceNextTurnSide = null;
let isFilterEnabled = true;

function selectSide(side) {

        forecastText.innerText = "儀玄は高いATKと回避力を持つが、マッドタールの「汚染」によるSPD低下・ATK/DEF低下と「拘束」による回避不能状態には警戒が必要。敵は攻撃を避けるごとに狙いを研ぎ澄ましてくるため長期戦は不利。敵の弱点である「100以上のダメージを与えた際の肉体硬化（DEF低下）」を狙い、大技を一気に叩き込む戦術が求められる。";

function startBattle() {
    document.getElementById('screen-select').classList.remove('active');
    document.getElementById('screen-battle').classList.add('active');
    document.getElementById('heroine-visual').src = heroineImages[0];
    document.getElementById('enemy-visual').src = enemyImage;

    // 変数リセット
    storedFullLog = "";
    storedActionLog = "";

    for(let i=0; i<3; i++) {
        drawCard(heroine, 'normal');
        drawCard(enemy, 'normal');
    }

    log(`◆ 闘技場バトル開幕 ◆`, 'system');
    log(`青黒いエーテルエネルギーの残滓と、観客たちの歪んだ欲望が混ざり合う地下闘技場。`, 'text');
    log(`儀玄: ${heroine.dialogue.intro.outer}`, 'text');
    log(`儀玄: ${heroine.dialogue.intro.inner}`, 'text');
    log(`マッドタール: 「${enemy.dialogue.intro}」`, 'enemy-speech');

    nextTurnLoop();
}

function drawCard(char, type) {
    if (char.current.hand.length >= 5) return;
    const pool = type === 'normal' ? char.normalCards : char.specialCards;
    const randomCard = pool[Math.floor(Math.random() * pool.length)];
    char.current.hand.push({ ...randomCard });
}

function getModifiedStats(char, isHeroine) {
    let mod = { atk: char.stats.atk, def: char.stats.def, spd: char.stats.spd, int: char.stats.int };
    
    if (isHeroine) {
        if (char.current.pollutionValue > 0) {
            mod.spd -= char.current.pollutionValue;
            mod.atk -= 25; // 汚染による攻撃力低下
            mod.def -= 25; // 汚染による防御力低下
        }

        switch(char.current.state) {
            case "昂揚": mod.atk += 10; mod.int += 10; break;
            case "怯え": mod.atk -= 5; mod.int -= 5; mod.spd -= 5; break;
            case "屈辱": mod.int -= 20; break;
            case "絶望": mod.int -= 30; break;
        }
    } else {
        if (char.current.defDebuffTurns > 0) {
            mod.def = 30; // 弱点硬化によるDEF低下
        } else {
            mod.def += (char.current.missCount * 5); // 回避されるごとにDEF上昇（上限なし）
        }
    }

    if(mod.atk < 1) mod.atk = 1;
    if(mod.def < 1) mod.def = 1;
    if(mod.spd < 1) mod.spd = 1;
    if(mod.int < 1) mod.int = 1;
    return mod;
}

function calculateNextTurnSpeed() {
    const hMod = getModifiedStats(heroine, true);
    const eMod = getModifiedStats(enemy, false);
    const hSpeed = (enemy.current.actionCount + 1) * hMod.spd;
    const eSpeed = (heroine.current.actionCount + 1) * eMod.spd;
    return { hSpeed, eSpeed };
}

function nextTurnLoop() {
    if (isGameOver) return;

    updateUI();
    let activeSide = '';

    if (heroine.current.stunnedTurns > 0) {
        log(`【反動】儀玄は全エネルギー消費による行動不能状態（残り ${heroine.current.stunnedTurns} ターン）`, 'system');
        heroine.current.stunnedTurns--;
        activeSide = 'enemy'; 
        forceNextTurnSide = null;
    } 
    else if (forceNextTurnSide) {
        activeSide = forceNextTurnSide;
        log(`⚡ 儀玄の戦法【カウンター＆ヒット＆アウェイ】発動！ 回避から流れるように自身の主導権へ持ち込む！`, 'system');
        forceNextTurnSide = null;
    } else {
        const { hSpeed, eSpeed } = calculateNextTurnSpeed();
        document.getElementById('h-speed-val').innerText = hSpeed;
        document.getElementById('e-speed-val').innerText = eSpeed;

        if (hSpeed > eSpeed) activeSide = 'heroine';
        else if (eSpeed > hSpeed) activeSide = 'enemy';
        else activeSide = Math.random() < 0.5 ? 'heroine' : 'enemy';
    }

    const activeChar = activeSide === 'heroine' ? heroine : enemy;
    
    if (activeSide === 'heroine') {
        const randomImg = heroineImages[Math.floor(Math.random() * heroineImages.length)];
        document.getElementById('heroine-visual').src = randomImg;

        if (heroine.current.evadeBuffTurns > 0) {
            heroine.current.evadeBuffTurns--;
            if(heroine.current.evadeBuffTurns === 0) log(`玄墨陣法の回避太極陣が消滅した。`, 'system');
        }
        if (heroine.current.disable阵法Turns > 0) {
            heroine.current.disable阵法Turns--;
        }
    } else {
        if (enemy.current.defDebuffTurns > 0) {
            enemy.current.defDebuffTurns--;
            if (enemy.current.defDebuffTurns === 0) log(`マッドタールの硬化が解け、防御力が元に戻った。`, 'system');
        }
    }

    if (activeChar.current.isBound) {
        updateUI();
        log(`◆ ターン獲得: ${activeSide === 'heroine' ? heroine.name : enemy.name} ◆`, 'system');
        log(`⛓️ ${activeChar.name}は拘束されていて行動できない！`, 'warning');
        
        if (Math.random() < 0.5) {
            activeChar.current.isBound = false;
            if(activeSide === 'heroine') log(`儀玄: 「はぁっ…！ この程度の汚泥で…私を止められるとでも！」\n➡ 儀玄は力を振り絞り、自力で拘束を振りほどいた！`, 'system');
            else log(`➡ マッドタールは拘束を解いた！`, 'system');
        } else {
            if(activeSide === 'heroine') log(`儀玄: 「くっ…離れろ…体が、動かない…っ！」\n➡ 拘束は強固で抜け出せない…！`, 'text');
            else log(`➡ 拘束から抜け出せない…！`, 'text');
        }

        activeChar.current.actionCount++;
        document.getElementById('command-area').style.pointerEvents = 'none';
        setTimeout(nextTurnLoop, 1500);
        return;
    }

    const drawCount = activeChar.current.skippedLastTurn ? 2 : 1;
    activeChar.current.skippedLastTurn = false;
    for(let i=0; i<drawCount; i++) {
        drawCard(activeChar, 'normal');
    }

    if (heroine.current.state === "屈辱") {
        enemy.current.chargeValue += 10;
        log(`【精神状態：屈辱】掌門としての自尊心が苛まれ、敵のチャージが10上昇。`, 'system');
        checkCharge(enemy);
    }

    updateMentalStateBeforeTurn();
    updateUI();

    log(`◆ ターン獲得: ${activeSide === 'heroine' ? heroine.name : enemy.name} ◆`, 'system');

    if(Math.random() < 0.4) {
        const yell = spectatorsPool[Math.floor(Math.random() * spectatorsPool.length)];
        log(`観客席の歪んだ歓声: ${yell}`, 'spectator');
    }

    if (playerSide === activeSide) {
        document.getElementById('command-area').style.pointerEvents = 'auto';
        document.getElementById('pass-button').style.display = 'block';
        document.getElementById('turn-indicator').innerText = "あなたのターン";
        renderHand(activeChar);
    } else {
        document.getElementById('command-area').style.pointerEvents = 'none';
        document.getElementById('turn-indicator').innerText = "相手が思考中...";
        setTimeout(() => { aiTurn(activeSide, activeChar); }, 1200);
    }
}

function aiTurn(side, char) {
    if (char.current.hand.length === 0) {
        char.current.skippedLastTurn = true;
        log(`${char.name}は行動をパスした。`, 'text');
    } else {
        let validCards = char.current.hand.filter(c => {
            if (side === 'heroine' && c.is阵法 && heroine.current.disable阵法Turns > 0) return false;
            return true;
        });

        if (validCards.length === 0) {
            char.current.skippedLastTurn = true;
            log(`${char.name}は有効な手札がなくパスした。`, 'text');
        } else {
            validCards.sort((a,b) => b.power - a.power);
            const selectedCard = validCards[0];
            const cardIndex = char.current.hand.findIndex(c => c.id === selectedCard.id);
            executeCardEffect(side, selectedCard);
            char.current.hand.splice(cardIndex, 1);
        }
    }
    char.current.actionCount++;
    setTimeout(nextTurnLoop, 1500);
}

function useCard(index) {
    const char = playerSide === 'heroine' ? heroine : enemy;
    const card = char.current.hand[index];
    char.current.hand.splice(index, 1);
    executeCardEffect(playerSide, card);
    char.current.actionCount++;
    document.getElementById('command-area').style.pointerEvents = 'none';
    setTimeout(nextTurnLoop, 1500);
}

function playerPass() {
    const char = playerSide === 'heroine' ? heroine : enemy;
    char.current.skippedLastTurn = true;
    log(`${char.name}は息を整え、カードを使わずにターンを終了した。`, 'text');
    char.current.actionCount++;
    document.getElementById('command-area').style.pointerEvents = 'none';
    setTimeout(nextTurnLoop, 1500);
}

function executeCardEffect(attackerSide, card) {
    const isHeroineAttacking = attackerSide === 'heroine';
    const attacker = isHeroineAttacking ? heroine : enemy;
    const defender = isHeroineAttacking ? enemy : heroine;

    const attMod = getModifiedStats(attacker, isHeroineAttacking);
    const defMod = getModifiedStats(defender, !isHeroineAttacking);

    log(`${attacker.name}の行動：【${card.name}】`, 'text');

    if (isHeroineAttacking && card.is阵法) {
        heroine.current.evadeBuffTurns = 2;
        log(`🔮 儀玄の周囲に太極陣法が展開される！ 2ターンの間、回避値が+40される。`, 'system');
        return;
    }

    let hitValue = attMod.spd + attMod.int + card.hit;
    if (!isHeroineAttacking) {
        hitValue += (attacker.current.missCount * 10);
    }

    let evadeValue = defMod.spd + defMod.int;

    if (!isHeroineAttacking && heroine.current.evadeBuffTurns > 0) {
        evadeValue += 40;
    }

    if (defender.current.isBound) {
        evadeValue = 0;
    }

    let hitRate = (hitValue - evadeValue) / 100;
    if (hitRate < 1/3 && !defender.current.isBound) hitRate = 1/3;
    if (defender.current.isBound) hitRate = 1.0;

    const isHit = Math.random() < hitRate;

    let didSpecialDialogue = false;

    if (card.name === "青溟爆震") {
        log(`儀玄: 「全エーテル解放！ 青溟の翼よ、奴を灰燼に帰せ！」`, 'text');
    } else if (card.name === "コローシブ・スラッジ") {
        log(`マッドタール: 「トケロ！ マジレ！ オマエノスベテヲ、ドロドロニシテヤルゥ！！」`, 'enemy-speech');
        if (!isHit) {
            log(`儀玄: 「遅すぎる！ そのような穢れ、触れるまでも無い！」`, 'text');
            didSpecialDialogue = true;
        } else {
            log(`儀玄: 「きゃああっ！！ 熱い、服が溶け…いや、見ないで…っ！」`, 'text');
            didSpecialDialogue = true;
        }
    } else if (card.name === "アビス・ヘル・バインド") {
        log(`マッドタール: 「ニガサナイ…オマエノナカニ、ハイリコンデヤル…！！」`, 'enemy-speech');
        if (!isHit) {
            log(`儀玄: 「間一髪…！ 捕まれば、私は私でなくなっていた…！」`, 'text');
            didSpecialDialogue = true;
        } else {
            log(`儀玄: 「んんっ！？ 口に、鼻に…！ やめ、はいってこないでぇぇっ！！…ぁ…」`, 'text');
            didSpecialDialogue = true;
        }
    }

    if (!isHit) {
        if (!didSpecialDialogue) {
            log(`【MISS】 ${defender.name}は攻撃を鮮やかに回避した！`, 'text');
        }
        
        if (!isHeroineAttacking) {
            forceNextTurnSide = 'heroine'; 
            attacker.current.missCount++;
            log(`【牽制待ち戦法】マッドタールは攻撃を避けられ、狙いを研ぎ澄ます！（次回命中+10 / DEF+5 [上限なし]）`, 'system');
        }
        return;
    }

    // 命中時処理：敵の戦法効果をリセット
    if (!isHeroineAttacking) {
        if (attacker.current.missCount > 0) {
            log(`【牽制待ち戦法・解除】マッドタールの攻撃が命中し、研ぎ澄まされた狙いと硬さがリセットされた。`, 'system');
        }
        attacker.current.missCount = 0; 
    }

    const isCrit = Math.random() < (attMod.int / 200);
    let damage = attMod.atk + card.power - defMod.def;
    if (damage < 1) damage = 1;
    if (isCrit) damage = Math.floor(damage * 1.5);

    defender.current.hp -= damage;
    if (defender.current.hp < 0) defender.current.hp = 0;

    if (isCrit) log(`💥 クリティカル！ 急所を撃ち抜いた！`, 'system');
    log(`${defender.name}に ${damage} のダメージ！`, 'text');

    if (!didSpecialDialogue) {
        if (damage <= 30) {
            if (isHeroineAttacking) {
                log(`儀玄: 「チッ…浅いか。不快な肉体だ」`, 'text');
                log(`マッドタール: 「グジュ…キクワケ、ネェダロ…」`, 'enemy-speech');
            } else {
                log(`儀玄: 「ふん、そよ風にも劣るな」`, 'text');
                log(`マッドタール: 「アサカッタカ…スベスベノハダ…」`, 'enemy-speech');
            }
        } else if (damage <= 60) {
            if (isHeroineAttacking) {
                log(`儀玄: 「ふっ、確実に削らせてもらうぞ」`, 'text');
                log(`マッドタール: 「ギチチ…コシャクナ…！」`, 'enemy-speech');
            } else {
                log(`儀玄: 「くっ…油断はできんな」`, 'text');
                log(`マッドタール: 「グチャァ…イイオトダ…」`, 'enemy-speech');
            }
        } else if (damage <= 99) {
            if (isHeroineAttacking) {
                log(`儀玄: 「はぁぁぁっ！ 塵と砕けよ！」`, 'text');
                log(`マッドタール: 「グガァァッ！ イタイ、イタイゾォォ！」`, 'enemy-speech');
            } else {
                log(`儀玄: 「きゃああっ！？…ぐ、なんて重い一撃だ…！」`, 'text');
                log(`マッドタール: 「ギャハハハ！ モットナケ！ モットォ！」`, 'enemy-speech');
            }
        } else {
            if (isHeroineAttacking) {
                log(`儀玄: 「これぞ雲霄の真髄！ 消し飛べぇぇっ！！」`, 'text');
                log(`マッドタール: 「ギャアアアアッ！？ カタマル…オレノカラダガ、カタマルゥッ！！」`, 'enemy-speech');
            } else {
                log(`儀玄: 「ああっ！！…ば、馬鹿な、私の術式がこうも容易く…！？」`, 'text');
                log(`マッドタール: 「グシャッ！ クダケチレ！ キレイナオニンギョウサン！」`, 'enemy-speech');
            }
        }
    }

    if (!isHeroineAttacking) {
        if (card.pollute > 0) {
            heroine.current.pollutionValue += card.pollute;
            log(`⚠️ 【汚染】粘液が絡みつき、儀玄の汚染度が ${card.pollute} 上昇！（現在: ${heroine.current.pollutionValue}） SPD・ATK・DEFが低下していく…！`, 'warning');
            log(`儀玄: 「ああっ、服が、肌が…！ 泥に塗れて…術の循環が乱される…！」`, 'text');
            heroine.current.state = "屈辱";
        }
        if (card.isBind) {
            heroine.current.isBound = true;
            log(`⛓️ 【拘束】儀玄はタール触手に完全に捕らえられた！ 行動不能＆回避不能！`, 'warning');
            log(`儀玄: 「しまっ…！？ 触手が、体に巻き付いて…！ 離せ、この穢らわしい…！」`, 'text');
        }
    } else {
        if (damage >= 100) {
            enemy.current.defDebuffTurns = 2; 
            log(`⚡ 【弱点露呈】100以上のダメージを受けたマッドタールの不定形肉体が硬化！1ターンの間、DEFが「30」に低下！`, 'warning');
        }
        if (card.isUltimate) {
            heroine.current.evadeBuffTurns = 0; 
            heroine.current.disable阵法Turns = 2; 
            heroine.current.stunnedTurns = 1; 
            log(`⚡ 【青溟爆震の反動】全エーテルエネルギーを瞬時に吐き出した代償として、太極陣法が強制消滅。2ターンの間陣法が封じられ、次ターン行動不能となる！`, 'system');

            if (damage <= 30) {
                heroine.current.state = "絶望";
                log(`⚠️ 極限まで解放した術式が粘液の盾に吸収され、まともなダメージが入らない！ 儀玄の誇りが内側から瓦解し、【絶望】状態へ転落した。`, 'warning');
            }
        }
    }

    if (!card.isSpecial) {
        const n = Math.floor(Math.random() * 4);
        attacker.current.chargeValue += (card.charge * n);
        checkCharge(attacker);
    }

    checkDeath();
}

function checkCharge(char) {
    if (char.current.chargeValue >= 100) {
        char.current.chargeValue -= 100;
        const specPool = char.specialCards;
        const sCard = specPool[Math.floor(Math.random() * specPool.length)];
        if (char.current.hand.length < 5) {
            char.current.hand.push({ ...sCard });
            log(`🔥 【CHARGE BURST】 ${char.name}は強力な必殺カード【${sCard.name}】を高めたチャージからドローした！`, 'system');
        }
    }
}

function updateMentalStateBeforeTurn() {
    heroine.current.lastState = heroine.current.state;
    const hasHeroineSpecial = heroine.current.hand.some(c => c.isSpecial);
    const hasEnemySpecial = enemy.current.hand.some(c => c.isSpecial);

    if (heroine.current.lastState === "通常") {
        if (hasHeroineSpecial) {
            heroine.current.state = "昂揚";
            log(`✨ 儀玄の精神が【昂揚】に満ちる。強力な術法の展開準備が整い、掌門としての自信が昂まる。`, 'system');
        } else if (enemy.current.hp >= heroine.current.hp * 2) {
            heroine.current.state = "怯え";
            log(`😰 儀玄の精神が【怯え】へ。化け物の圧倒的な生命力と悍ましい姿を前に、超然とした構えの裏で微かな戦慄が走る。`, 'system');
        }
    } else if (heroine.current.lastState === "怯え" && hasEnemySpecial) {
        heroine.current.state = "絶望";
        log(`☠️ 儀玄の精神が【絶望】へと陥る。肉体的な劣勢に加え、触手と粘液の放つ凶悪な予兆が彼女の心をへし折る。`, 'warning');
    }
}

function toggleFilter() {
    isFilterEnabled = !isFilterEnabled;
    const btn = document.getElementById('filter-toggle-btn');
    if (isFilterEnabled) {
        btn.innerText = "汚染フィルター: ON";
        btn.classList.add('active');

// ========== ログコピー処理（完全対応版） ========== //

// 確実なコピーを実現するためのフォールバック処理
function fallbackCopyTextToClipboard(text, logName) {
    if (!text || text.trim() === "") {
        alert("コピーするログがありません。");
        return;
    }

    if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text).then(() => {
            alert(`【成功】${logName}をクリップボードにコピーしました！`);
        }).catch(err => {
            useTextareaCopy(text, logName);
        });
    } else {
        useTextareaCopy(text, logName);
    }
}

function useTextareaCopy(text, logName) {
    const textArea = document.createElement("textarea");
    textArea.value = text;
    textArea.style.top = "0";
    textArea.style.left = "0";
    textArea.style.position = "fixed";
    textArea.style.opacity = "0"; // 画面に見えないようにする
    document.body.appendChild(textArea);
    textArea.focus();
    textArea.select();

    try {
        const successful = document.execCommand('copy');
        if (successful) {
            alert(`【成功】${logName}をクリップボードにコピーしました！`);
        } else {
            alert("コピーに失敗しました。お使いのブラウザは対応していない可能性があります。");
        }
    } catch (err) {
        alert("エラーが発生し、コピーに失敗しました。");
    }
    document.body.removeChild(textArea);
}

function copyLog() {
    fallbackCopyTextToClipboard(storedFullLog, "全戦闘ログ");
}

function copyActionLog() {
    fallbackCopyTextToClipboard(storedActionLog, "アクション・ダメージログ");
}

function updateUI() {
    document.getElementById('heroine-hp-bar').style.width = `${(heroine.current.hp / 500) * 100}%`;
    document.getElementById('heroine-hp-text').innerText = `HP: ${heroine.current.hp}`;
    document.getElementById('heroine-charge-bar').style.width = `${Math.min(heroine.current.chargeValue, 100)}%`;
    document.getElementById('heroine-charge-text').innerText = `CHG: ${heroine.current.chargeValue}`;

    document.getElementById('enemy-hp-bar').style.width = `${(enemy.current.hp / 500) * 100}%`;
    document.getElementById('enemy-hp-text').innerText = `HP: ${enemy.current.hp}`;
    document.getElementById('enemy-charge-bar').style.width = `${Math.min(enemy.current.chargeValue, 100)}%`;
    document.getElementById('enemy-charge-text').innerText = `CHG: ${enemy.current.chargeValue}`;

    const mTag = document.getElementById('heroine-mental');
    mTag.innerText = heroine.current.state;
    mTag.className = `mental-tag m-${heroine.current.state}`;

    const heroineVisualContainer = document.getElementById('heroine-visual-container');
    const heroineMudOverlay = document.getElementById('heroine-mud-overlay');
    
    const fPanel = document.getElementById('filter-panel-area');
    const pollMarkerLine = document.getElementById('polluted-marker-line');
    const pollMarker = document.getElementById('polluted-marker');
    const bindMarker = document.getElementById('heroine-bind-marker');

    if (heroine.current.isBound) {
        bindMarker.innerHTML = `<span class="bind-badge">⛓️ 拘束</span>`;
    } else {
        bindMarker.innerHTML = '';
    }

    if (heroine.current.pollutionValue > 0) {
        pollMarker.innerHTML = `<span class="debuff-badge">⚠️ 汚染度: ${heroine.current.pollutionValue} (SPD・ATK・DEF低下)</span>`;
        pollMarkerLine.style.display = 'block';
        fPanel.style.display = 'flex'; 

        if (isFilterEnabled) {
            heroineVisualContainer.classList.add('polluted'); 
            heroineMudOverlay.classList.add('active'); 
        } else {
            heroineVisualContainer.classList.remove('polluted'); 
            heroineMudOverlay.classList.remove('active'); 
        }
    } else {
        pollMarker.innerHTML = '';
        pollMarkerLine.style.display = 'none';
        fPanel.style.display = 'none';
        heroineVisualContainer.classList.remove('polluted');
        heroineMudOverlay.classList.remove('active');
    }

    if (heroine.current.evadeBuffTurns > 0) {
        heroineVisualContainer.classList.add('visual-effect-glow');
    } else {
        heroineVisualContainer.classList.remove('visual-effect-glow');
    }

    const hMod = getModifiedStats(heroine, true);
    document.getElementById('h-spd').innerText = hMod.spd;
    document.getElementById('h-int').innerText = hMod.int;
    document.getElementById('h-atk').innerText = hMod.atk;
    document.getElementById('h-def').innerText = hMod.def;
    
    const eMod = getModifiedStats(enemy, false);
    document.getElementById('e-def').innerText = eMod.def;
}

function renderHand(char) {
    const container = document.getElementById('hand-container');
    container.innerHTML = '';
    
    char.current.hand.forEach((card, idx) => {
        const is陣法Disabled = (playerSide === 'heroine' && card.is阵法 && heroine.current.disable阵法Turns > 0);
        let cardClass = 'card';
        if (card.isSpecial) {
            cardClass += playerSide === 'heroine' ? ' special' : ' enemy-special';
        }
        if (is陣法Disabled) cardClass += ' disabled';
        
        const cardEl = document.createElement('div');
        cardEl.className = cardClass;
        
        cardEl.innerHTML = `
            <div class="card-name">${card.name}</div>
            <div style="font-size:9px; color:#8892b0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${card.desc}</div>
            <div class="card-meta">
                <span>P:${card.power}</span>
                <span>H:${card.hit}</span>
                <span>C:${card.charge !== undefined ? card.charge : '-'}</span>
            </div>
        `;
        if (!is陣法Disabled) {
            cardEl.onclick = () => useCard(idx);
        }
        container.appendChild(cardEl);
    });
}

function log(text, type) {
    const logArea = document.getElementById('log-area');
    const entry = document.createElement('div');
    entry.className = `log-entry log-${type}`;
    
    // UI表示用にはそのままHTMLとして入れる（修飾などが入っているため）
    // ログコピー用のテキスト化処理ではタグを除去するためにDOM機能を使う
    let htmlContent = text;

    // 前回の修飾付きHTML指定を外し、テキストベースでのシンプルな見た目に統一する
    // （変数へプレーンテキストとして正しく格納するため）
    const tempDiv = document.createElement("div");
    tempDiv.innerHTML = text;
    let plainText = tempDiv.textContent || tempDiv.innerText || "";

    // 修飾タグが含まれている場合も、UI上はそのまま見せる
    if (type === 'heroine-outer' || type === 'heroine-inner' || type === 'enemy-speech' || type === 'system' || type === 'warning') {
        entry.innerHTML = htmlContent;
    } else {
        entry.innerHTML = htmlContent;
    }
    
    logArea.appendChild(entry);
    // ログが追加されたら一番下まで自動スクロールする
    logArea.scrollTop = logArea.scrollHeight; 

    // コピー用の変数にプレーンテキストを保存
    storedFullLog += plainText + "\n";
    
    // アクションログ用フィルタリング
    if (plainText.includes('の行動：') || plainText.includes('のダメージ！') || plainText.includes('攻撃を鮮やかに回避した！') || plainText.includes('MISS')) {
        storedActionLog += plainText + "\n";
    }
}
